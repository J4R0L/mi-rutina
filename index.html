<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mi Rutina - Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-border: #1e1e2e;
    --card-hover: #1a1a28;
    --text: #e8e8ef;
    --text-dim: #7a7a8c;
    --text-muted: #4a4a5c;
    --accent-red: #ff4757;
    --accent-blue: #3742fa;
    --accent-green: #2ed573;
    --accent-yellow: #ffa502;
    --accent-purple: #a855f7;
    --accent-cyan: #18dcff;
    --gradient-1: linear-gradient(135deg, #ff4757, #ff6b81);
    --gradient-2: linear-gradient(135deg, #3742fa, #5352ed);
    --gradient-3: linear-gradient(135deg, #ffa502, #ffbe76);
    --gradient-4: linear-gradient(135deg, #2ed573, #7bed9f);
    --gradient-5: linear-gradient(135deg, #a855f7, #c084fc);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    padding: 30px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(167, 85, 247, 0.08), transparent 60%);
    pointer-events: none;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8e8ef, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .stat-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    white-space: nowrap;
  }

  .stat-chip span { color: var(--text); font-weight: 600; }

  /* Navigation */
  .nav-tabs {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--card-border);
  }

  .nav-tab {
    flex-shrink: 0;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
    background: var(--card);
    color: var(--text-dim);
    -webkit-tap-highlight-color: transparent;
  }

  .nav-tab.active { color: white; border-color: transparent; }
  .nav-tab[data-day="1"].active { background: var(--gradient-1); }
  .nav-tab[data-day="2"].active { background: var(--gradient-2); }
  .nav-tab[data-day="3"].active { background: var(--gradient-3); }
  .nav-tab[data-day="4"].active { background: var(--gradient-4); }
  .nav-tab[data-day="5"].active { background: var(--gradient-5); }
  .nav-tab[data-day="notes"].active { background: linear-gradient(135deg, #636e72, #b2bec3); }
  .nav-tab[data-day="log"].active { background: linear-gradient(135deg, #18dcff, #48dbfb); }

  /* Day content */
  .day-content {
    display: none;
    padding: 16px 16px;
    animation: fadeIn 0.3s ease;
  }

  .day-content.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .day-1 .day-header { background: var(--gradient-1); }
  .day-2 .day-header { background: var(--gradient-2); }
  .day-3 .day-header { background: var(--gradient-3); }
  .day-4 .day-header { background: var(--gradient-4); }
  .day-5 .day-header { background: var(--gradient-5); }

  .day-header h2 {
    font-size: 1.15rem;
    font-weight: 700;
    color: white;
  }

  .day-header .subtitle {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    margin-top: 2px;
  }

  .day-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .time-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    font-size: 0.7rem;
    color: white;
    font-weight: 500;
  }

  .progress-text {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  /* Exercise cards */
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: all 0.3s;
  }

  .exercise-card.completed {
    opacity: 0.5;
    border-color: var(--accent-green);
  }

  .exercise-card.completed .exercise-name {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .exercise-main {
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .exercise-num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .exercise-card.completed .exercise-num {
    background: var(--accent-green) !important;
  }

  .exercise-card.completed .exercise-num::after {
    content: '✓';
  }

  .exercise-card.completed .exercise-num span { display: none; }

  .day-1 .exercise-num { background: var(--gradient-1); }
  .day-2 .exercise-num { background: var(--gradient-2); }
  .day-3 .exercise-num { background: var(--gradient-3); }
  .day-4 .exercise-num { background: var(--gradient-4); }
  .day-5 .exercise-num { background: var(--gradient-5); }

  .exercise-info { flex: 1; min-width: 0; }

  .exercise-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .exercise-muscle {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .exercise-meta {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .meta-tag {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.68rem;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
  }

  .meta-tag.sets { color: var(--accent-cyan); }
  .meta-tag.rest { color: var(--accent-yellow); }

  /* Action buttons row */
  .exercise-actions {
    display: flex;
    border-top: 1px solid var(--card-border);
  }

  .action-btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    border: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
  }

  .action-btn:active {
    background: rgba(255,255,255,0.05);
  }

  .action-btn + .action-btn {
    border-left: 1px solid var(--card-border);
  }

  .action-btn .icon { font-size: 1rem; display: block; margin-bottom: 2px; }

  .action-btn.video-btn:active { color: var(--accent-red); }
  .action-btn.timer-btn:active { color: var(--accent-yellow); }
  .action-btn.weight-btn:active { color: var(--accent-cyan); }
  .action-btn.check-btn:active { color: var(--accent-green); }

  /* Timer Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.active { display: flex; }

  .timer-modal {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    width: 85%;
    max-width: 320px;
  }

  .timer-label {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 4rem;
    font-weight: 600;
    color: var(--text);
    margin: 10px 0;
    line-height: 1;
  }

  .timer-display.warning { color: var(--accent-yellow); }
  .timer-display.done { color: var(--accent-green); }

  .timer-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .timer-btn-action {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'Outfit', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .timer-btn-start {
    background: var(--accent-green);
    color: #000;
  }

  .timer-btn-stop {
    background: var(--accent-red);
    color: white;
  }

  .timer-btn-close {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  .timer-presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 15px;
  }

  .timer-preset {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }

  .timer-preset.active {
    border-color: var(--accent-yellow);
    color: var(--accent-yellow);
  }

  /* Weight Modal */
  .weight-modal {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    width: 85%;
    max-width: 320px;
  }

  .weight-modal h3 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .weight-modal .exercise-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .weight-input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .weight-input-wrap {
    flex: 1;
  }

  .weight-input-wrap label {
    display: block;
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .weight-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
  }

  .weight-input:focus {
    border-color: var(--accent-cyan);
  }

  .weight-history {
    margin-top: 16px;
    max-height: 150px;
    overflow-y: auto;
  }

  .weight-history-title {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .weight-entry {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 0.78rem;
  }

  .weight-entry .date { color: var(--text-dim); }
  .weight-entry .value { color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace; }

  .weight-entry .trend-up { color: var(--accent-green); }
  .weight-entry .trend-down { color: var(--accent-red); }

  .weight-save-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--accent-cyan);
    color: #000;
    font-family: 'Outfit', sans-serif;
    margin-top: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  .weight-close-btn {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: rgba(255,255,255,0.1);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Video Modal */
  .video-modal {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    width: 92%;
    max-width: 400px;
  }

  .video-modal h3 {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-close-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: rgba(255,255,255,0.1);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    margin-top: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Warning box */
  .warning-box {
    background: rgba(255, 165, 2, 0.08);
    border: 1px solid rgba(255, 165, 2, 0.2);
    border-radius: 12px;
    padding: 14px;
    margin-top: 10px;
    margin-bottom: 8px;
  }

  .warning-box .title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent-yellow);
    margin-bottom: 4px;
  }

  .warning-box p {
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* Reset day button */
  .reset-btn {
    display: block;
    margin: 16px auto 0;
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:active {
    border-color: var(--accent-red);
    color: var(--accent-red);
  }

  /* Notes section */
  .notes-section { padding: 0 4px; }

  .note-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }

  .note-card .label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .note-card p {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .label-red { color: var(--accent-red); }
  .label-blue { color: var(--accent-blue); }
  .label-green { color: var(--accent-green); }
  .label-yellow { color: var(--accent-yellow); }
  .label-purple { color: var(--accent-purple); }
  .label-cyan { color: var(--accent-cyan); }

  /* Weights reference table */
  .section-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 16px 4px 8px;
  }

  .weights-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--card-border);
  }

  .weights-table th {
    background: var(--card);
    padding: 10px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-align: left;
  }

  .weights-table td {
    padding: 10px 12px;
    font-size: 0.78rem;
    border-top: 1px solid var(--card-border);
    background: var(--bg);
  }

  .weights-table td:last-child {
    color: var(--accent-cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
  }

  .weights-table tr:nth-child(even) td { background: var(--card); }

  /* Log section */
  .log-section { padding: 0 4px; }

  .log-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }

  .log-card .date-header {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent-cyan);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .log-exercise {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.78rem;
  }

  .log-exercise .name { color: var(--text-dim); }
  .log-exercise .weight { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .log-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .log-empty .icon { font-size: 2rem; margin-bottom: 10px; }

  .clear-log-btn {
    display: block;
    margin: 16px auto 0;
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>💪 RUTINA 5 DÍAS</h1>
  <p>Prioridad Brazos + Definición</p>
</div>

<div class="stats-row">
  <div class="stat-chip">🎯 Brazos <span>2x/sem</span></div>
  <div class="stat-chip">🦵 Cuádriceps <span>énfasis</span></div>
  <div class="stat-chip">🍗 Proteína <span>150-165g</span></div>
  <div class="stat-chip">📉 Déficit <span>300-500kcal</span></div>
  <div class="stat-chip">😴 Descanso <span>Mié + Dom</span></div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" data-day="1" onclick="showDay(1)">LUN</div>
  <div class="nav-tab" data-day="2" onclick="showDay(2)">MAR</div>
  <div class="nav-tab" data-day="3" onclick="showDay(3)">JUE</div>
  <div class="nav-tab" data-day="4" onclick="showDay(4)">VIE</div>
  <div class="nav-tab" data-day="5" onclick="showDay(5)">SÁB</div>
  <div class="nav-tab" data-day="notes" onclick="showDay('notes')">📋</div>
  <div class="nav-tab" data-day="log" onclick="showDay('log')">📊</div>
</div>

<!-- Modal overlays -->
<div class="modal-overlay" id="timerModal">
  <div class="timer-modal">
    <div class="timer-label" id="timerLabel">Descanso</div>
    <div class="timer-display" id="timerDisplay">01:30</div>
    <div class="timer-presets">
      <button class="timer-preset" onclick="setTimer(45)">45s</button>
      <button class="timer-preset" onclick="setTimer(60)">60s</button>
      <button class="timer-preset active" onclick="setTimer(90)">90s</button>
      <button class="timer-preset" onclick="setTimer(120)">120s</button>
    </div>
    <div class="timer-buttons">
      <button class="timer-btn-action timer-btn-close" onclick="closeTimer()">Cerrar</button>
      <button class="timer-btn-action timer-btn-start" id="timerStartBtn" onclick="toggleTimer()">Iniciar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="weightModal">
  <div class="weight-modal">
    <h3>Registrar Peso</h3>
    <div class="exercise-label" id="weightExerciseLabel">—</div>
    <div class="weight-input-group">
      <div class="weight-input-wrap">
        <label>Peso (kg)</label>
        <input type="number" class="weight-input" id="weightInput" placeholder="0" inputmode="decimal" step="0.5">
      </div>
      <div class="weight-input-wrap">
        <label>Reps</label>
        <input type="number" class="weight-input" id="repsInput" placeholder="0" inputmode="numeric">
      </div>
    </div>
    <div class="weight-history" id="weightHistory"></div>

// ==================== STATE ====================
let currentDay = 1;
let timerInterval = null;
let timerSeconds = 90;
let timerRunning = false;
let currentTimerTotal = 90;
let currentWeightExercise = null;
let currentWeightDay = null;

// ==================== STORAGE ====================
function getChecked(day) {
  try { return JSON.parse(localStorage.getItem(`checked_${day}`) || '[]'); }
  catch { return []; }
}

function setChecked(day, arr) {
  localStorage.setItem(`checked_${day}`, JSON.stringify(arr));
}

function getWeightLog() {
  try { return JSON.parse(localStorage.getItem('weightLog') || '{}'); }
  catch { return {}; }
}

function saveWeightLog(log) {
  localStorage.setItem('weightLog', JSON.stringify(log));
}

// ==================== RENDER ====================
function renderApp() {
  const app = document.getElementById('app');
  let html = '';
  
  // Render each day
  for (let day = 1; day <= 5; day++) {
    const d = exercises[day];
    const checked = getChecked(day);
    const completedCount = checked.length;
    const totalCount = d.items.length;
    
    html += `<div class="day-content day-${day} ${day === 1 ? 'active' : ''}" id="day-${day}">`;
    html += `<div class="day-header">`;
    html += `<h2>${d.title}</h2>`;
    html += `<div class="subtitle">${d.subtitle}</div>`;
    html += `<div class="day-header-row">`;
    html += `<div class="time-badge">⏱ ${d.time}</div>`;
    html += `<div class="progress-text">${completedCount}/${totalCount} completados</div>`;
    html += `</div></div>`;
    
    d.items.forEach((ex, i) => {
      const isCompleted = checked.includes(i);
      html += `<div class="exercise-card ${isCompleted ? 'completed' : ''}" id="card-${day}-${i}">`;
      html += `<div class="exercise-main">`;
      html += `<div class="exercise-num"><span>${i + 1}</span></div>`;
      html += `<div class="exercise-info">`;
      html += `<div class="exercise-name">${ex.name}</div>`;
      html += `<div class="exercise-muscle">${ex.muscle}</div>`;
      html += `<div class="exercise-meta">`;
      html += `<span class="meta-tag sets">${ex.sets}</span>`;
      html += `<span class="meta-tag rest">${ex.rest}</span>`;
      html += `</div></div></div>`;
      
      html += `<div class="exercise-actions">`;
      html += `<button class="action-btn video-btn" onclick="openVideo(${day}, ${i})"><span class="icon">▶️</span>Video</button>`;
      html += `<button class="action-btn timer-btn" onclick="openTimer(${day}, ${i})"><span class="icon">⏱</span>Timer</button>`;
      html += `<button class="action-btn weight-btn" onclick="openWeight(${day}, ${i})"><span class="icon">🏋️</span>Peso</button>`;
      html += `<button class="action-btn check-btn" onclick="toggleCheck(${day}, ${i})"><span class="icon">${isCompleted ? '✅' : '⬜'}</span>${isCompleted ? 'Hecho' : 'Marcar'}</button>`;
      html += `</div></div>`;
    });
    
    if (d.warning) {
      html += `<div class="warning-box"><div class="title">⚠️ Nota rodilla</div><p>${d.warning}</p></div>`;
    }
    
    html += `<button class="reset-btn" onclick="resetDay(${day})">🔄 Reiniciar día</button>`;
    html += `</div>`;
  }
  
  // Notes section
  html += `<div class="day-content" id="day-notes"><div class="notes-section">`;
  html += `<div class="section-title">Puntos Clave</div>`;
  
  const notes = [
    { label: "Prioridad Brazos", color: "red", text: "Bíceps y tríceps se trabajan 2x/semana (día secundario + día dedicado). Antebrazos 2x/semana." },
    { label: "Cuádriceps", color: "green", text: "Día de pierna con pre-activación + 4 ejercicios directos de cuádriceps para fortalecer la rodilla." },
    { label: "Técnica", color: "blue", text: "Controla la fase excéntrica (bajar el peso en 2-3 seg). En brazos esto es clave para crecimiento." },
    { label: "Progresión", color: "purple", text: "Cuando completes todas las reps del rango superior, sube peso la siguiente sesión." },
    { label: "Proteína", color: "cyan", text: "150-165g diarios (1.8-2g por kg de peso). Fundamental para construcción muscular." },
    { label: "Déficit Calórico", color: "yellow", text: "300-500 kcal bajo mantenimiento para definición sin perder músculo." },
    { label: "Rodilla", color: "red", text: "Evitar movimientos rotacionales, lunges libres y saltos. Todo lineal y controlado." },
    { label: "Abdomen", color: "green", text: "2-3 series de planchas (30-45 seg) al final de los días 1 y 2. Los abs se definen con la dieta." },
    { label: "Descanso", color: "blue", text: "Dormir mínimo 7 horas. La recuperación es donde el músculo crece." },
    { label: "Cardio", color: "purple", text: "Bicicleta estática 20-30 min post-entreno o en día de descanso para ayudar al déficit." },
  ];
  
  notes.forEach(n => {
    html += `<div class="note-card"><div class="label label-${n.color}">${n.label}</div><p>${n.text}</p></div>`;
  });
  
  html += `<div class="section-title" style="margin-top:20px">Pesos de Referencia</div>`;
  html += `<table class="weights-table"><thead><tr><th>Ejercicio</th><th>Peso</th></tr></thead><tbody>`;
  
  const refWeights = [
    ["Press inclinado/plano", "10-14 kg c/u"],
    ["Aperturas / Cruces", "6-10 kg c/u"],
    ["Curl bíceps", "8-12 kg c/u"],
    ["Curl martillo", "8-10 kg c/u"],
    ["Curl concentrado", "6-8 kg"],
    ["Extensión tríceps polea", "15-25 kg"],
    ["Press francés", "6-10 kg c/u"],
    ["Elevaciones laterales", "6-10 kg c/u"],
    ["Curl muñeca", "4-8 kg c/u"],
    ["Farmer walk", "16-24 kg c/u"],
  ];
  
  refWeights.forEach(w => {
    html += `<tr><td>${w[0]}</td><td>${w[1]}</td></tr>`;
  });
  
  html += `</tbody></table></div></div>`;
  
  // Log section
  html += `<div class="day-content" id="day-log"><div class="log-section">`;
  html += `<div class="section-title">Historial de Pesos</div>`;
  
  const log = getWeightLog();
  const dates = Object.keys(log).sort().reverse();
  
  if (dates.length === 0) {
    html += `<div class="log-empty"><div class="icon">📊</div><p>Aún no hay registros.<br>Usa el botón 🏋️ en cada ejercicio para guardar tus pesos.</p></div>`;
  } else {
    dates.slice(0, 30).forEach(date => {
      const entries = log[date];
      html += `<div class="log-card"><div class="date-header">📅 ${date}</div>`;
      entries.forEach(e => {
        html += `<div class="log-exercise"><span class="name">${e.name}</span><span class="weight">${e.weight}kg × ${e.reps}</span></div>`;
      });
      html += `</div>`;
    });
    html += `<button class="clear-log-btn" onclick="clearLog()">🗑 Borrar historial</button>`;
  }
  
  html += `</div></div>`;
  
  app.innerHTML = html;
}

// ==================== NAVIGATION ====================
function showDay(day) {
  document.querySelectorAll('.day-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  
  const dayId = day === 'notes' ? 'day-notes' : day === 'log' ? 'day-log' : `day-${day}`;
  document.getElementById(dayId).classList.add('active');
  
  const tabSelector = `[data-day="${day}"]`;
  document.querySelector(tabSelector).classList.add('active');
  
  if (typeof day === 'number') currentDay = day;
}

// ==================== CHECKLIST ====================
function toggleCheck(day, index) {
  let checked = getChecked(day);
  if (checked.includes(index)) {
    checked = checked.filter(i => i !== index);
  } else {
    checked.push(index);
  }
  setChecked(day, checked);
  renderApp();
  showDay(day);
}

function resetDay(day) {
  if (confirm('¿Reiniciar todos los ejercicios de este día?')) {
    setChecked(day, []);
    renderApp();
    showDay(day);
  }
}

// ==================== TIMER ====================
function openTimer(day, index) {
  const ex = exercises[day].items[index];
  timerSeconds = ex.restSec;
  currentTimerTotal = ex.restSec;
  timerRunning = false;
  clearInterval(timerInterval);
  
  document.getElementById('timerLabel').textContent = `Descanso — ${ex.name}`;
  updateTimerDisplay();
  updatePresets();
  document.getElementById('timerStartBtn').textContent = 'Iniciar';
  document.getElementById('timerStartBtn').className = 'timer-btn-action timer-btn-start';
  document.getElementById('timerModal').classList.add('active');
}

function setTimer(sec) {
  timerSeconds = sec;
  currentTimerTotal = sec;
  timerRunning = false;
  clearInterval(timerInterval);
  updateTimerDisplay();
  updatePresets();
  document.getElementById('timerStartBtn').textContent = 'Iniciar';
  document.getElementById('timerStartBtn').className = 'timer-btn-action timer-btn-start';
}

function updatePresets() {
  document.querySelectorAll('.timer-preset').forEach(el => {
    el.classList.toggle('active', parseInt(el.textContent) === currentTimerTotal);
  });
}

function toggleTimer() {
  if (timerRunning) {
    timerRunning = false;
    clearInterval(timerInterval);
    document.getElementById('timerStartBtn').textContent = 'Continuar';
    document.getElementById('timerStartBtn').className = 'timer-btn-action timer-btn-start';
  } else {
    if (timerSeconds <= 0) {
      timerSeconds = currentTimerTotal;
    }
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = 'Pausar';
    document.getElementById('timerStartBtn').className = 'timer-btn-action timer-btn-stop';
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerDisplay').className = 'timer-display done';
        document.getElementById('timerDisplay').textContent = '¡GO!';
        document.getElementById('timerStartBtn').textContent = 'Reiniciar';
        document.getElementById('timerStartBtn').className = 'timer-btn-action timer-btn-start';
        // Vibrate if supported
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      }
    }, 1000);
  }
}

function updateTimerDisplay() {
  const min = Math.floor(timerSeconds / 60);
  const sec = timerSeconds % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  
  if (timerSeconds <= 10 && timerSeconds > 0) {
    display.className = 'timer-display warning';
  } else {
    display.className = 'timer-display';
  }
}

function closeTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerModal').classList.remove('active');
}

// ==================== WEIGHT LOG ====================
function openWeight(day, index) {
  currentWeightDay = day;
  currentWeightExercise = index;
  const ex = exercises[day].items[index];
  
  document.getElementById('weightExerciseLabel').textContent = ex.name;
  document.getElementById('weightInput').value = '';
  document.getElementById('repsInput').value = '';
  
  // Show history
  const log = getWeightLog();
  const historyHtml = [];
  const dates = Object.keys(log).sort().reverse();
  let count = 0;
  
  for (const date of dates) {
    const entries = log[date].filter(e => e.day === day && e.index === index);
    entries.forEach(e => {
      if (count < 5) {
        historyHtml.push(`<div class="weight-entry"><span class="date">${date}</span><span class="value">${e.weight}kg × ${e.reps} reps</span></div>`);
        count++;
      }
    });
  }
  
  const historyEl = document.getElementById('weightHistory');
  if (historyHtml.length > 0) {
    historyEl.innerHTML = `<div class="weight-history-title">Últimos registros</div>${historyHtml.join('')}`;
  } else {
    historyEl.innerHTML = `<div class="weight-history-title">Sin registros previos</div>`;
  }
  
  document.getElementById('weightModal').classList.add('active');
  setTimeout(() => document.getElementById('weightInput').focus(), 300);
}

function saveWeight() {
  const weight = parseFloat(document.getElementById('weightInput').value);
  const reps = parseInt(document.getElementById('repsInput').value);
  
  if (!weight || !reps) {
    alert('Ingresa peso y reps');
    return;
  }
  
  const ex = exercises[currentWeightDay].items[currentWeightExercise];
  const today = new Date().toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
  
  const log = getWeightLog();
  if (!log[today]) log[today] = [];
  
  // Remove previous entry for same exercise today
  log[today] = log[today].filter(e => !(e.day === currentWeightDay && e.index === currentWeightExercise));
  
  log[today].push({
    day: currentWeightDay,
    index: currentWeightExercise,
    name: ex.name,
    weight: weight,
    reps: reps
  });
  
  saveWeightLog(log);
  closeWeight();
  renderApp();
  showDay(currentWeightDay);
}

function closeWeight() {
  document.getElementById('weightModal').classList.remove('active');
}

function clearLog() {
  if (confirm('¿Borrar todo el historial de pesos?')) {
    localStorage.removeItem('weightLog');
    renderApp();
    showDay('log');
  }
}

// ==================== VIDEO ====================
function openVideo(day, index) {
  const ex = exercises[day].items[index];
  document.getElementById('videoTitle').textContent = ex.name;
  document.getElementById('videoFrame').src = ex.video + '?rel=0';
  document.getElementById('videoModal').classList.add('active');
}

function closeVideo() {
  document.getElementById('videoFrame').src = '';
  document.getElementById('videoModal').classList.remove('active');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(modal => {
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      closeTimer();
      closeWeight();
      closeVideo();
    }
  });
});

// ==================== INIT ====================
renderApp();
</script>
